      - name: customer_nation_hk
        description: "Hashkey связи клиент-страна."
      - name: customer_hk
        description: "FK на клиента."
      - name: nation_hk
        description: "FK на страну."
      - name: effective_from
        description: "Начало действия связи."
      - name: effective_to
        description: "Окончание действия связи."
