      - name: nation_region_hk
        description: "Hashkey связи страна-регион."
      - name: nation_hk
        description: "FK на страну."
      - name: region_hk
        description: "FK на регион."
      - name: effective_from
        description: "Начало действия связи."
      - name: effective_to
        description: "Окончание действия связи."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
