version: 2

models:
  - name: hub_customer
    description: "Hub клиентов (бизнес-ключ `c_custkey`)."
    columns:
      - name: customer_hk
        description: "Hashkey клиента."
        tests: [not_null, unique]
      - name: c_custkey
        description: "Бизнес-ключ клиента из источника TPCH."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
      - name: record_source
        description: "Источник записи."

  - name: hub_supplier
    description: "Hub поставщиков (бизнес-ключ `s_suppkey`)."
    columns:
      - name: supplier_hk
        description: "Hashkey поставщика."
        tests: [not_null, unique]
      - name: s_suppkey
        description: "Бизнес-ключ поставщика из источника TPCH."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
      - name: record_source
        description: "Источник записи."

  - name: hub_part
    description: "Hub деталей (бизнес-ключ `p_partkey`)."
    columns:
      - name: part_hk
        description: "Hashkey детали."
        tests: [not_null, unique]
      - name: p_partkey
        description: "Бизнес-ключ детали из источника TPCH."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
      - name: record_source
        description: "Источник записи."

  - name: hub_order
    description: "Hub заказов (бизнес-ключ `o_orderkey`)."
    columns:
      - name: order_hk
        description: "Hashkey заказа."
        tests: [not_null, unique]
      - name: o_orderkey
        description: "Бизнес-ключ заказа из источника TPCH."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
      - name: record_source
        description: "Источник записи."

  - name: hub_nation
    description: "Hub стран (бизнес-ключ `n_nationkey`)."
    columns:
      - name: nation_hk
        description: "Hashkey страны."
        tests: [not_null, unique]
      - name: n_nationkey
        description: "Бизнес-ключ страны из источника TPCH."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
      - name: record_source
        description: "Источник записи."

  - name: hub_region
    description: "Hub регионов (бизнес-ключ `r_regionkey`)."
    columns:
      - name: region_hk
        description: "Hashkey региона."
        tests: [not_null, unique]
