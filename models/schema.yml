        description: "Бизнес-ключ региона из источника TPCH."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
      - name: record_source
        description: "Источник записи."

  - name: link_order_customer
    description: "Effectivity Link заказ-клиент."
    columns:
      - name: order_customer_hk
        description: "Hashkey связи заказ-клиент."
      - name: order_hk
        description: "FK на заказ."
      - name: customer_hk
        description: "FK на клиента."
      - name: effective_from
        description: "Начало действия связи."
      - name: effective_to
        description: "Окончание действия связи."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
      - name: record_source
        description: "Источник записи."

  - name: link_part_supplier
    description: "Effectivity Link деталь-поставщик."
    columns:
      - name: part_supplier_hk
        description: "Hashkey связи деталь-поставщик."
      - name: part_hk
        description: "FK на деталь."
      - name: supplier_hk
        description: "FK на поставщика."
      - name: effective_from
        description: "Начало действия связи."
      - name: effective_to
        description: "Окончание действия связи."
