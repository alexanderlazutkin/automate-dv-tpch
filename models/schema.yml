  - name: link_lineitem
    description: "Транзакционный Link строк заказа."
    columns:
      - name: lineitem_hk
        description: "Hashkey строки заказа (`l_orderkey` + `l_linenumber`)."
        tests: [not_null, unique]
      - name: order_hk
        description: "FK на заказ."
      - name: part_hk
        description: "FK на деталь."
      - name: supplier_hk
        description: "FK на поставщика."
      - name: l_linenumber
        description: "Номер строки в заказе."
      - name: l_quantity
        description: "Количество."
      - name: l_extendedprice
        description: "Стоимость до скидок и налогов."
      - name: l_discount
        description: "Скидка."
      - name: l_tax
        description: "Налог."
      - name: l_returnflag
        description: "Флаг возврата."
      - name: l_linestatus
        description: "Статус строки."
      - name: l_shipdate
        description: "Дата отгрузки."
      - name: l_commitdate
        description: "Дата commit."
      - name: l_receiptdate
        description: "Дата получения."
      - name: l_shipinstruct
        description: "Инструкция по отгрузке."
      - name: l_shipmode
        description: "Режим отгрузки."
      - name: l_comment
        description: "Комментарий к строке."
      - name: effective_from
        description: "Дата эффективности записи."
      - name: load_datetime
        description: "Технический timestamp загрузки в Raw Vault."
      - name: record_source
        description: "Источник записи."

